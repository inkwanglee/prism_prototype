{# Legacy Dataset create/edit form. Crispy renders the whole form including the submit button. #}
{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body">
                {# crispy form helper renders the form fields with Bootstrap 5 markup. #}
                {% crispy form %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
