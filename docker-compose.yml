services:
  web:
    build: .
    command: bash -c "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn prism_site.wsgi:application --bind 0.0.0.0:8000 --reload"
    ports: 
      - "8000:8000"
    env_file: .env.dev
    volumes: 
      - .:/app
    depends_on:
      - db
      - redis
      - minio
      - keycloak

  worker:
    build: .
    command: celery -A prism_site worker -l info
    env_file: .env.dev
    volumes: 
      - .:/app
    depends_on:
      - db
      - redis

  beat:
    build: .
    command: celery -A prism_site beat -l info
    env_file: .env.dev
    volumes: 
      - .:/app
    depends_on:
      - db
      - redis

  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_DB: prism
      POSTGRES_USER: prism
      POSTGRES_PASSWORD: prism
    ports: 
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports: 
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports: 
      - "9000:9000"
      - "9001:9001"
    volumes: 
      - minio_data:/data

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports: 
      - "8080:8080"

volumes:
  postgres_data:
  minio_data: