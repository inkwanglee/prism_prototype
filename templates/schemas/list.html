{% extends 'base.html' %}

{% block content %}
<div class="mb-3">
    <form method="post" action="{% url 'schemas:initialize_db' %}" id="initForm">
        {% csrf_token %}
        <button type="submit" class="btn btn-warning" id="initBtn">
            <i class="bi bi-database-gear"></i> Initialize Database
        </button>
    </form>
</div>

<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0"><i class="bi bi-filetype-json"></i> Schema.json</h5>
        <button type="button" class="btn btn-success" id="saveBtn" onclick="saveSchema()">
            <i class="bi bi-save"></i> Save
        </button>
    </div>
    <div class="card-body p-0">
        <form method="post" action="{% url 'schemas:save_schema' %}" id="schemaForm">
            {% csrf_token %}
            <textarea
                name="schema_content"
                id="schemaEditor"
                class="form-control border-0 rounded-0"
                style="min-height: 70vh; font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; font-size: 0.875rem; resize: vertical; tab-size: 4; white-space: pre; overflow-wrap: normal; overflow-x: auto;"
                spellcheck="false"
            >{{ schema_content }}</textarea>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    function saveSchema() {
        document.getElementById('schemaForm').submit();
    }

    // Ctrl+S / Cmd+S to save
    document.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 's') {
            e.preventDefault();
            saveSchema();
        }
    });

    // Tab key inserts a tab character instead of moving focus
    document.getElementById('schemaEditor').addEventListener('keydown', function(e) {
        if (e.key === 'Tab') {
            e.preventDefault();
            var start = this.selectionStart;
            var end = this.selectionEnd;
            this.value = this.value.substring(0, start) + '    ' + this.value.substring(end);
            this.selectionStart = this.selectionEnd = start + 4;
        }
    });

    // Confirm before initializing
    document.getElementById('initForm').addEventListener('submit', function(e) {
        if (!confirm('This will create/recreate database tables from the current Schema.json. Continue?')) {
            e.preventDefault();
        }
    });
</script>
{% endblock %}
