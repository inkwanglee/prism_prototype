{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign In — PRISM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="{% static 'css/theme-prism-dark.css' %}" rel="stylesheet">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--prism-bg);
        }
        .login-card { max-width: 420px; width: 100%; }
        .brand-logo { width: 48px; height: 48px; border-radius: 12px; }
        .btn-sso {
            background: var(--prism-accent);
            border-color: var(--prism-accent-3);
            color: #121216;
            font-weight: 600;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
        }
        .btn-sso:hover {
            background: var(--prism-accent-2);
            border-color: var(--prism-accent-2);
            color: #121216;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="card shadow-lg">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <img src="{% static 'img/prism-mark.png' %}" class="brand-logo mb-3" alt="PRISM">
                    <h3 class="fw-bold mb-1">PRISM</h3>
                    <p class="text-muted">
                        Platform for Resource Intelligence<br>&amp; Subsurface Management
                    </p>
                </div>

                {% if messages %}
                {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                {% endfor %}
                {% endif %}

                <div class="d-grid gap-2">
                    <a href="{% url 'accounts:login_start' %}?next={{ next|urlencode }}"
                       class="btn btn-sso btn-lg">
                        <i class="bi bi-shield-lock me-2"></i>
                        Sign in with SSO
                    </a>
                </div>

                <hr class="my-4">

                <div class="text-center">
                    <small class="text-muted">
                        Authenticated via GeoDesk Identity Provider
                    </small>
                </div>
            </div>
        </div>

        {% if debug %}
        <div class="text-center mt-3">
            <small>
                <a href="/admin/login/?next={{ next|urlencode }}" class="text-muted">
                    Admin login (dev only)
                </a>
            </small>
        </div>
        {% endif %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
