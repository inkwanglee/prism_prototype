services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports: 
      - "8000:8000"
    env_file: .env.dev
    environment:
      # Inside Docker, server-side calls use internal hostname
      OIDC_ISSUER_INTERNAL: http://keycloak:8080/realms/prism
    volumes: 
      - .:/app
    depends_on:
      keycloak:
        condition: service_healthy
      db:
        condition: service_started
      redis:
        condition: service_started

  worker:
    build: .
    command: celery -A prism_site worker -l info
    env_file: .env.dev
    volumes: 
      - .:/app
    depends_on:
      - db
      - redis

  beat:
    build: .
    command: celery -A prism_site beat -l info
    env_file: .env.dev
    volumes: 
      - .:/app
    depends_on:
      - db
      - redis

  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_DB: prism
      POSTGRES_USER: prism
      POSTGRES_PASSWORD: prism
    ports: 
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports: 
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports: 
      - "9000:9000"
      - "9001:9001"
    volumes: 
      - minio_data:/data

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: "8080"
      KC_HOSTNAME_STRICT_BACKCHANNEL: "false"
    ports: 
      - "8080:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak/prism-realm.json:/opt/keycloak/data/import/prism-realm.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

volumes:
  postgres_data:
  minio_data:
  keycloak_data:
